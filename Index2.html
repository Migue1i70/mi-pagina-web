<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Registro de Usuarios</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#f4f6f8;padding:32px;color:#222}
    .container{max-width:720px;margin:0 auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
    h1{margin-top:0}
    .row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    input[type="text"], input[type="number"]{flex:1;padding:8px;border:1px solid #ccd;border-radius:4px}
    button{padding:8px 12px;border:none;border-radius:4px;background:#007BFF;color:white;cursor:pointer}
    button.secondary{background:#6c757d}
    button.danger{background:#dc3545}
    table{width:100%;border-collapse:collapse;margin-top:12px}
    th,td{padding:8px;border:1px solid #e3e6ea;text-align:left}
    th{background:#f1f5f9}
    .actions button{margin-right:6px;padding:6px 8px;font-size:13px}
    small{color:#555}
  </style>
</head>
<body>
<div class="container">
  <h1>Registro de Usuarios</h1>

  <div class="row">
    <input type="text" id="nombre" placeholder="Nombre usuario">
    <input type="number" id="edad" placeholder="Edad" min="0">
    <button id="btnAgregar">Agregar</button>
    <button id="btnBorrarTodo" class="danger">Borrar todo</button>
  </div>

  <div style="margin-bottom:8px">
    <label for="filtro">Buscar / Consultar: </label>
    <input type="text" id="filtro" placeholder="Filtrar por nombre" style="width:60%;padding:6px;border:1px solid #ccd;border-radius:4px">
  </div>

  <h2>Lista de Usuarios <small id="contador"></small></h2>
  <table id="tablaUsuarios" aria-live="polite">
    <thead>
      <tr><th>Nombre</th><th>Edad</th><th>Acciones</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
  const STORAGE_KEY = 'mis_usuarios';

  function cargarUsuarios(){
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch (e) {
      console.error('Error leyendo localStorage', e);
      return [];
    }
  }

  function guardarUsuarios(arr){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
    actualizarContador(arr.length);
  }

  function generarId(){ 
    return Date.now() + Math.floor(Math.random()*1000); 
  }

  function escapeHtml(str){
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#039;');
  }

  function agregarUsuario(){
    const nombreEl = document.getElementById('nombre');
    const edadEl = document.getElementById('edad');
    const nombre = nombreEl.value.trim();
    const edad = edadEl.value.trim();

    if(!nombre || !edad){
      alert('Ingrese nombre y edad.');
      return;
    }
    if(Number(edad) < 0){ 
      alert('Edad inválida'); 
      return; 
    }

    const usuarios = cargarUsuarios();
    usuarios.push({ id: generarId(), nombre, edad: Number(edad) });
    guardarUsuarios(usuarios);

    nombreEl.value = '';
    edadEl.value = '';
    nombreEl.focus();
    mostrarUsuarios();
  }

  function eliminarUsuario(id){
    if(!confirm('Eliminar este usuario?')) return;
    const usuarios = cargarUsuarios().filter(u => u.id !== id);
    guardarUsuarios(usuarios);
    mostrarUsuarios();
  }

  function borrarTodo(){
    if(!confirm('Borrar todos los usuarios?')) return;
    localStorage.removeItem(STORAGE_KEY);
    mostrarUsuarios();
  }

  function mostrarUsuarios(){
    const filtro = document.getElementById('filtro').value.toLowerCase();
    const usuarios = cargarUsuarios().filter(u => u.nombre.toLowerCase().includes(filtro));
    const tbody = document.querySelector('#tablaUsuarios tbody');
    tbody.innerHTML = '';

    if(usuarios.length === 0){
      const tr = document.createElement('tr');
      tr.innerHTML = '<td colspan="3" style="text-align:center;color:#666">No hay usuarios</td>';
      tbody.appendChild(tr);
      actualizarContador(0);
      return;
    }

    usuarios.forEach(u => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${escapeHtml(u.nombre)}</td>
                      <td>${escapeHtml(String(u.edad))}</td>
                      <td class="actions">
                        <button onclick="eliminarUsuario(${u.id})" class="danger">Eliminar</button>
                      </td>`;
      tbody.appendChild(tr);
    });
    actualizarContador(usuarios.length);
  }

  function actualizarContador(n){
    document.getElementById('contador').textContent = n ? `(${n})` : '';
  }

  document.getElementById('btnAgregar').addEventListener('click', agregarUsuario);
  document.getElementById('btnBorrarTodo').addEventListener('click', borrarTodo);
  document.getElementById('filtro').addEventListener('input', mostrarUsuarios);

  document.getElementById('nombre').addEventListener('keydown', e => { 
    if(e.key === 'Enter') agregarUsuario(); 
  });
  document.getElementById('edad').addEventListener('keydown', e => { 
    if(e.key === 'Enter') agregarUsuario(); 
  });

  document.addEventListener('DOMContentLoaded', mostrarUsuarios);
</script>
</body>
</html>
